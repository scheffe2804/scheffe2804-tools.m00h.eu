services:

  # ── Landing page + ads.txt ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tools-nginx
    restart: unless-stopped
    pids_limit: 128
    mem_limit: 256m
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./landing:/usr/share/nginx/html:ro
    networks:
      - tools_net
    expose:
      - "80"

  # ── IT-Tools ───────────────────────────────────────────────────
  it-tools:
    image: corentinth/it-tools:latest
    container_name: tools-it-tools
    restart: unless-stopped
    pids_limit: 256
    mem_limit: 512m
    networks:
      - tools_net
    expose:
      - "80"

  # ── Stirling PDF ───────────────────────────────────────────────
  stirling:
    image: frooodle/s-pdf:latest
    container_name: tools-stirling
    restart: unless-stopped
    pids_limit: 256
    mem_limit: 2g
    environment:
      DOCKER_ENABLE_SECURITY: false
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: false
    volumes:
      - ./data/stirling/configs:/configs
      - ./data/stirling/logs:/logs
    networks:
      - tools_net
    expose:
      - "8080"

  # ── LibreSpeed ─────────────────────────────────────────────────
  librespeed:
    image: linuxserver/librespeed:latest
    container_name: tools-librespeed
    restart: unless-stopped
    pids_limit: 128
    mem_limit: 256m
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Europe/Berlin
      PASSWORD: ""
      CUSTOM_RESULTS: false
      DB_TYPE: none
    networks:
      - tools_net
    expose:
      - "80"

  # ── PrivateBin ─────────────────────────────────────────────────
  privatebin:
    image: privatebin/nginx-fpm-alpine:latest
    container_name: tools-privatebin
    restart: unless-stopped
    read_only: true
    pids_limit: 128
    mem_limit: 256m
    volumes:
      - privatebin_data:/srv/data
    networks:
      - tools_net
    expose:
      - "80"

  # ── Pingvin Share ──────────────────────────────────────────────
  pingvin:
    image: stonith404/pingvin-share:latest
    container_name: tools-pingvin
    restart: unless-stopped
    pids_limit: 256
    mem_limit: 512m
    environment:
      PORT: "3000"
      NEXTAUTH_URL: https://share.tools.m00h.eu
      NEXTAUTH_SECRET_FILE: ""
    volumes:
      - pingvin_data:/opt/app/backend/data
    networks:
      - tools_net
    expose:
      - "3000"

  # ── Shlink DB ──────────────────────────────────────────────────
  shlink-db:
    image: mariadb:11
    container_name: tools-shlink-db
    restart: unless-stopped
    pids_limit: 256
    mem_limit: 512m
    environment:
      MARIADB_DATABASE: shlink
      MARIADB_USER: shlink
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    env_file:
      - /srv/tools-m00h-eu/secrets/shlink.env
    volumes:
      - shlink_db_data:/var/lib/mysql
    networks:
      - tools_net
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -ushlink -p$$MARIADB_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── Shlink (URL-Shortener) ─────────────────────────────────────
  shlink:
    image: shlinkio/shlink:latest
    container_name: tools-shlink
    restart: unless-stopped
    pids_limit: 256
    mem_limit: 512m
    environment:
      DEFAULT_DOMAIN: go.tools.m00h.eu
      IS_HTTPS_ENABLED: "true"
      DB_DRIVER: mysql
      DB_HOST: shlink-db
      DB_PORT: "3306"
      DB_NAME: shlink
      DB_USER: shlink
      TIMEZONE: Europe/Berlin
    env_file:
      - /srv/tools-m00h-eu/secrets/shlink.env
    depends_on:
      shlink-db:
        condition: service_healthy
    networks:
      - tools_net
    expose:
      - "8080"

  # ── Cloudflare Tunnel ──────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tools-cloudflared
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run:rw,noexec,nosuid,nodev,size=32m
    pids_limit: 128
    mem_limit: 256m
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - /srv/tools-m00h-eu/secrets/cloudflared:/run/tools-secrets/cloudflared:ro
    depends_on:
      - nginx
    networks:
      - tools_net

networks:
  tools_net:
    name: tools-m00h-internal

volumes:
  privatebin_data:
  pingvin_data:
  shlink_data:
  shlink_db_data:
